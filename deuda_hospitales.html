.metric label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.metric span{font-size:22px;font-weight:600;color:#1a1a1a}
.metric.alerta span{color:#c0392b}
.tabs{display:flex;border-bottom:2px solid #ddd;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:#1a1a1a;background:#f0f0f0}

input,select{font-size:13px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a}

button{font-size:13px;cursor:pointer;padding:7px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a}

button.primary{background:#2E75B6;color:#fff;border-color:#2E75B6;font-weight:500}
button.primary:hover{background:#1a5c9e}
button.warn{background:#fff3cd;color:#856404;border-color:#ffc107;padding:4px 10px;font-size:12px}
button.danger{background:#fde8e8;color:#c0392b;border-color:#e74c3c;padding:4px 10px;font-size:12px}
button.save{background:#d4edda;color:#155724;border-color:#28a745;font-weight:500}
button.save:hover{background:#c3e6cb}
.wrap{overflow-x:auto;border-radius:8px;border:1px solid #e0e0e0}
table{width:100%;border-collapse:collapse;background:#fff}
thead th{background:#f0f4f8;color:#444;font-weight:600;font-size:12px;padding:10px;text-align:left;white-space:nowrap;border-bottom:1px solid #ddd}
tbody td{font-size:12px;padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tbody tr:hover td{background:#f7fafd}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.badge-pago{background:#fde8e8;color:#c0392b}
.badge-entregar{background:#fff3cd;color:#856404}
.badge-entregada{background:#d4edda;color:#155724}
.badge-otro{background:#e9ecef;color:#495057}
.footer-table{font-size:12px;color:#666;margin-top:8px;text-align:right}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:16px}
.card h3{font-size:13px;font-weight:600;color:#1F3864;padding-bottom:10px;border-bottom:1px solid #eee;margin-bottom:12px}
.card-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

const ORGS_BASE=["HOSPITAL BOLLINI","HOSPITAL CABRED","HOSPITAL EVITA DE LANÚS","HOSPITAL MERCANTE","HTAL. PAROISSIEN - S JUSTO","REG. SANIT. VII - ITUZAINGÓ","UPA 18 - VIRREY DEL PINO"];
const fmt=n=>n?'$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'-';
function badgeClass(e){const v=String(e).toLowerCase();if(v.includes('pendiente')||v.includes('sin exp')||v.includes('vencida'))return'badge-pago';if(v.includes('entregar'))return'badge-entregar';if(v.includes('entregada')||v.includes('abonado')||v.includes('finalizado'))return'badge-entregada';return'badge-otro';}
function fmtDI(v){if(!v)return'';const[y,m,d]=v.split('-');return d+'/'+m+'/'+y;}
function parseDI(s){if(!s||!s.includes('/'))return'';const p=s.split('/');if(p.length<3)return'';return p[2]+'-'+p[1]+'-'+p[0];}

let DATA=JSON.parse(document.getElementById('data-store').textContent);
let tabActual='todas';
let editIdx=null;
let hayPendientes=false;

function marcarPendiente(){
  hayPendientes=true;
  document.getElementById('save-bar').style.display='flex';
}

// Guardar reescribiendo el archivo HTML completo con los datos actualizados
function guardarArchivo(){
  const html=document.documentElement.outerHTML;
  const jsonNuevo=JSON.stringify(DATA,null,2);
  // Reemplazar el contenido del script data-store
  const inicio=html.indexOf('<script id="data-store"');
  const finTag=html.indexOf('>',inicio)+1;
  const finScript=html.indexOf('<\/script>',finTag);
  const htmlNuevo=html.substring(0,finTag)+'\n'+jsonNuevo+'\n'+html.substring(finScript);
  const blob=new Blob([htmlNuevo],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='deuda_hospitales.html';
  a.click();
  URL.revokeObjectURL(a.href);
  hayPendientes=false;
  document.getElementById('save-bar').style.display='none';
  // Mostrar confirmacion
  const btn=document.querySelector('button.save');
  const orig=btn.textContent;
  btn.textContent='✓ Guardado';
  setTimeout(()=>{btn.textContent=orig;},2000);
}

function setTab(t,el){
  tabActual=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-tabla').style.display=t==='resumen'?'none':'block';
  document.getElementById('view-resumen').style.display=t==='resumen'?'block':'none';
  if(t==='resumen')renderResumen();else renderTabla();
}

function filtered(){
  const q=(document.getElementById('buscar').value||'').toLowerCase();
  const est=document.getElementById('filtro-estado').value;
  return DATA.filter(r=>{
    const mt=tabActual==='todas'||tabActual==='resumen'||r.org===tabActual;
    const mq=!q||(r.org+r.fact+r.exp+r.oc).toLowerCase().includes(q);
    const me=!est||r.estado===est;
    return mt&&mq&&me;
  });
}

function renderTabla(){
  const rows=filtered();
  document.getElementById('tbody').innerHTML=rows.map((r,i)=>`
    <tr>
      <td style="color:#999">${i+1}</td>
      <td style="font-weight:600;max-width:150px">${r.org}</td>
      <td>${r.oc||'-'}</td>
      <td>${r.fact||'-'}</td>
      <td style="white-space:nowrap">${r.fecha||'-'}</td>
      <td style="text-align:right;white-space:nowrap;font-weight:500">${fmt(r.imp)}</td>
      <td style="font-size:11px;max-width:180px;word-break:break-all">${r.exp||'-'}</td>
      <td style="font-size:11px;max-width:160px">${r.sit||'-'}</td>
      <td style="white-space:nowrap">${r.mov||'-'}</td>
      <td><span class="badge ${badgeClass(r.estado)}">${r.estado||'-'}</span></td>
      <td style="white-space:nowrap;display:flex;gap:4px">
        <button class="warn" onclick="abrirEdicion(${DATA.indexOf(r)})">Editar</button>
        <button class="danger" onclick="eliminar(${DATA.indexOf(r)})">x</button>
      </td>
    </tr>`).join('');
  const total=rows.reduce((s,r)=>s+(r.imp||0),0);
  document.getElementById('pie').textContent=`${rows.length} facturas · Total: ${fmt(total)}`;
}

function renderResumen(){
  const orgs=[...new Set(DATA.map(r=>r.org))].sort();
  const cards=orgs.map(org=>{
    const rows=DATA.filter(r=>r.org===org);
    const total=rows.reduce((s,r)=>s+(r.imp||0),0);
    const pend=rows.filter(r=>String(r.sit).includes('Pendiente')||String(r.estado).includes('pendiente')||String(r.estado).includes('sin exp')).length;
    const conExp=rows.filter(r=>r.exp).length;
    const sinExp=rows.filter(r=>!r.exp).length;
    const masVieja=rows.filter(r=>r.fecha).map(r=>r.fecha).sort()[0]||'-';
    return`<div class="card">
      <h3>${org}</h3>
      <div class="card-metrics">
        <div class="cm"><label>Facturas</label><span>${rows.length}</span></div>
        <div class="cm"><label>Total</label><span style="font-size:13px">${fmt(total)}</span></div>
      </div>
      <table><tbody>
        <tr><td>Con expediente GDEBA</td><td>${conExp}</td></tr>
        <tr><td>Sin expediente</td><td style="color:${sinExp?'#c0392b':'#155724'}">${sinExp}</td></tr>
        <tr><td>Con alerta de estado</td><td style="color:${pend?'#c0392b':'#155724'}">${pend}</td></tr>
        <tr><td>Factura más antigua</td><td>${masVieja}</td></tr>
      </tbody></table>
      <div class="fact-list">${rows.map(r=>`<div><span style="color:#666">Fact. ${r.fact}</span><span class="badge ${badgeClass(r.estado)}" style="font-size:10px">${r.estado||'-'}</span></div>`).join('')}</div>
    </div>`;
  }).join('');
  const totalAll=DATA.reduce((s,r)=>s+(r.imp||0),0);
  document.getElementById('view-resumen').innerHTML=`<div class="res-grid">${cards}
    <div class="card total-card">
      <h3>Total general</h3>
      <div class="card-metrics">
        <div class="cm"><label>Facturas</label><span>${DATA.length}</span></div>
        <div class="cm"><label>Total</label><span style="font-size:13px">${fmt(totalAll)}</span></div>
      </div>
      <table><tbody>
        <tr><td>Organismos</td><td>${orgs.length}</td></tr>
        <tr><td>Con expediente</td><td>${DATA.filter(r=>r.exp).length}</td></tr>
        <tr><td>Sin expediente</td><td>${DATA.filter(r=>!r.exp).length}</td></tr>
      </tbody></table>
    </div>
  </div>`;
}

function renderMetrics(){
  const total=DATA.reduce((s,r)=>s+(r.imp||0),0);
  const pend=DATA.filter(r=>String(r.sit).includes('Subdirección de Pagos')).length;
  const montoPend=DATA.filter(r=>String(r.sit).includes('Subdirección de Pagos')).reduce((s,r)=>s+(r.imp||0),0);
  const orgs=[...new Set(DATA.map(r=>r.org))].length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><label>Total adeudado</label><span>${fmt(total)}</span></div>
    <div class="metric"><label>Facturas</label><span>${DATA.length}</span></div>
    <div class="metric"><label>Organismos</label><span>${orgs}</span></div>
    <div class="metric"><label>En Subdirección de Pagos</label><span>${pend} fact.</span></div>
    <div class="metric alerta"><label>Monto en Subdir. Pagos</label><span style="font-size:15px">${fmt(montoPend)}</span></div>`;
}

function toggleOrgNuevo(){document.getElementById('f-org-nuevo-box').style.display=document.getElementById('f-org').value==='__nuevo__'?'block':'none';}

function limpiarForm(){
  ['f-oc','f-fact','f-imp','f-exp','f-org-nuevo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['f-fecha','f-mov'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-org').value='';
  document.getElementById('f-sit').value='';
  document.getElementById('f-estado').value='entregada';
  document.getElementById('f-org-nuevo-box').style.display='none';
  document.getElementById('f-err').style.display='none';
}

function abrirNueva(){editIdx=null;limpiarForm();document.getElementById('modal-title').textContent='Nueva factura';document.getElementById('modal-overlay').classList.add('open');}

function abrirEdicion(idx){
  editIdx=idx;const r=DATA[idx];limpiarForm();
  document.getElementById('modal-title').textContent='Editar factura — '+r.fact;
  if(ORGS_BASE.includes(r.org)){document.getElementById('f-org').value=r.org;}
  else{document.getElementById('f-org').value='__nuevo__';document.getElementById('f-org-nuevo-box').style.display='block';document.getElementById('f-org-nuevo').value=r.org;}
  document.getElementById('f-oc').value=r.oc||'';
  document.getElementById('f-fact').value=r.fact||'';
  document.getElementById('f-fecha').value=parseDI(r.fecha);
  document.getElementById('f-imp').value=r.imp||'';
  document.getElementById('f-exp').value=r.exp||'';
  document.getElementById('f-sit').value=r.sit||'';
  document.getElementById('f-mov').value=parseDI(r.mov);
  document.getElementById('f-estado').value=r.estado||'entregada';
  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal(){document.getElementById('modal-overlay').classList.remove('open');limpiarForm();editIdx=null;}

function guardar(){
  const orgSel=document.getElementById('f-org').value;
  const orgNuevo=document.getElementById('f-org-nuevo').value.trim();
  const org=orgSel==='__nuevo__'?orgNuevo:orgSel;
  const fact=document.getElementById('f-fact').value.trim();
  const imp=parseFloat(document.getElementById('f-imp').value)||0;
  const errEl=document.getElementById('f-err');
  if(!org){errEl.textContent='Seleccioná o ingresá el organismo.';errEl.style.display='block';return;}
  if(!fact){errEl.textContent='Ingresá el número de factura.';errEl.style.display='block';return;}
  if(!imp){errEl.textContent='Ingresá el importe.';errEl.style.display='block';return;}
  errEl.style.display='none';
  const nuevo={org,oc:document.getElementById('f-oc').value.trim(),fact,fecha:fmtDI(document.getElementById('f-fecha').value),imp,exp:document.getElementById('f-exp').value.trim(),sit:document.getElementById('f-sit').value,mov:fmtDI(document.getElementById('f-mov').value),estado:document.getElementById('f-estado').value};
  if(editIdx!==null){DATA[editIdx]=nuevo;}else{DATA.push(nuevo);}
  marcarPendiente();
  cerrarModal();renderMetrics();
  if(tabActual==='resumen')renderResumen();else renderTabla();
}

function eliminar(idx){
  if(confirm('¿Eliminar esta factura?')){
    DATA.splice(idx,1);
    marcarPendiente();
    renderMetrics();
    if(tabActual==='resumen')renderResumen();else renderTabla();
  }
}

function exportarCSV(){
  const rows=filtered();
  const h='Organismo,O/C,Factura,Fecha,Importe,Expediente,Situacion,Ult.Mov,Estado\n';
  const b=rows.map(r=>[r.org,r.oc,r.fact,r.fecha,r.imp,r.exp,r.sit,r.mov,r.estado].map(v=>'"'+(v||'')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h+b],{type:'text/csv;charset=utf-8;'}));
  a.download='facturas_hospitales.csv';a.click();
}

window.addEventListener('beforeunload',function(e){
  if(hayPendientes){e.preventDefault();e.returnValue='Tenés cambios sin guardar. ¿Salir de todas formas?';}
});

renderMetrics();renderTabla();
</script>
</body>
</html>
